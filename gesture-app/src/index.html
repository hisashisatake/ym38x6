<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>38x6 作曲支援</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #111; color: #eee; font-family: monospace; overflow: hidden; user-select: none; }

    #canvas { display: block; cursor: crosshair; }

    /* 左下: コード名 */
    #hud {
      position: fixed; bottom: 28px; left: 32px;
      pointer-events: none;
    }
    #chord-display {
      font-size: 80px; font-weight: bold; color: #fff; line-height: 1;
      text-shadow: 0 0 40px rgba(120,200,255,0.4);
      letter-spacing: -2px;
    }
    #chord-type-hint {
      font-size: 15px; color: #666; margin-top: 8px; letter-spacing: 2px;
    }

    /* 右上: ヒント */
    #hint {
      position: fixed; top: 14px; right: 18px;
      font-size: 12px; color: #444; text-align: right; line-height: 2;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>

  <div id="hud">
    <div id="chord-display">—</div>
    <div id="chord-type-hint"></div>
  </div>

  <div id="hint">
    ドラッグ: 発音 &nbsp;|&nbsp; R: 再キャリブレーション
  </div>

  <script src="main.js"></script>
</body>
</html>
